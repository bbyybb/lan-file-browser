name: CI

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]

jobs:
  attribution-check:
    name: Attribution integrity check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify donation files integrity
        run: |
          FAIL=0

          check_hash() {
            local file="$1" expected="$2"
            if [ ! -f "$file" ]; then echo "FAIL: $file missing"; FAIL=1; return; fi
            actual=$(sha256sum "$file" | cut -d' ' -f1)
            if [ "$actual" != "$expected" ]; then echo "FAIL: $file tampered"; FAIL=1; else echo "OK: $file"; fi
          }

          check_hash "docs/wechat_pay.jpg" "686b9d5bba59d6831580984cb93804543f346d943f2baf4a94216fd13438f1e6"
          check_hash "docs/alipay.jpg" "510155042b703d23f7eeabc04496097a7cc13772c5712c8d0716bab5962172dd"
          check_hash "docs/bmc_qr.png" "bfd20ef305007c3dacf30dde49ce8f0fe4d7ac3ffcc86ac1f83bc1e75cccfcd6"

          for m in "buymeacoffee.com/bbyybb" "sponsors/bbyybb" "wechat_pay.jpg" "alipay.jpg"; do
            if ! grep -q "$m" README.md; then echo "FAIL: README.md missing: $m"; FAIL=1; fi
          done

          if [ $FAIL -ne 0 ]; then
            echo ""; echo "Author attribution files have been modified."; exit 1
          fi
          echo "All checks passed."

  test:
    name: Test (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python-version: '3.8'
          - os: ubuntu-latest
            python-version: '3.11'
          - os: ubuntu-latest
            python-version: '3.12'
          - os: windows-latest
            python-version: '3.12'
          - os: macos-latest
            python-version: '3.12'
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: pip install -r requirements-dev.txt
      - name: Run tests with coverage
        run: pytest tests/ -v --cov=file_browser --cov-report=term-missing --cov-report=html
      - name: Upload coverage report
        if: matrix.python-version == '3.12' && matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/

  build:
    name: Build (${{ matrix.name }})
    needs: [attribution-check, test]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x86_64
            os: windows-latest
            archive: lan-file-browser-windows-x86_64
            ext: .zip
          - name: macOS Intel
            os: macos-latest
            archive: lan-file-browser-macos-x86_64
            ext: .tar.gz
            python_arch: x64
          - name: macOS Apple Silicon
            os: macos-latest
            archive: lan-file-browser-macos-aarch64
            ext: .tar.gz
          - name: Linux x86_64
            os: ubuntu-latest
            archive: lan-file-browser-linux-x86_64
            ext: .tar.gz

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          architecture: ${{ matrix.python_arch || '' }}

      - name: Install dependencies
        run: pip install pyinstaller flask

      - name: Build with PyInstaller
        shell: bash
        run: |
          pyinstaller --clean --noconfirm file_browser.spec

      - name: Verify binary runs
        shell: bash
        run: |
          if [[ "${{ matrix.os }}" == windows* ]]; then
            timeout 5 dist/lan-file-browser.exe --help 2>&1 || true
          else
            chmod +x dist/lan-file-browser
            timeout 5 dist/lan-file-browser --help 2>&1 || true
          fi

      - name: Get version
        id: version
        shell: bash
        run: |
          VER=$(python -c "import re; m=re.search(r'__version__\s*=\s*[\"'\'']([^\"'\'']+)', open('file_browser.py').read()); print('v'+m.group(1))" 2>/dev/null || echo "v1.0.0")
          echo "version=$VER" >> $GITHUB_OUTPUT

      - name: Package (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          ARCHIVE="${{ matrix.archive }}-${{ steps.version.outputs.version }}"
          mkdir -p "${ARCHIVE}"
          cp dist/lan-file-browser "${ARCHIVE}/"
          cp README.md LICENSE CHANGELOG.md stop_server.sh "${ARCHIVE}/"
          tar -czf "${ARCHIVE}.tar.gz" "${ARCHIVE}/"
          echo "ASSET=${ARCHIVE}.tar.gz" >> $GITHUB_ENV

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ver = "${{ steps.version.outputs.version }}"
          $archive = "${{ matrix.archive }}-${ver}"
          New-Item -ItemType Directory -Path $archive -Force
          Copy-Item "dist/lan-file-browser.exe" "$archive/"
          Copy-Item README.md, LICENSE, CHANGELOG.md, stop_server.bat "$archive/"
          Compress-Archive -Path "$archive" -DestinationPath "${archive}.zip"
          echo "ASSET=${archive}.zip" >> $env:GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: ${{ env.ASSET }}

  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          pattern: lan-file-browser-*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          body: |
            ## 下载 / Download

            | 平台 / Platform | 文件 / File |
            |---|---|
            | Windows (x86_64) | `lan-file-browser-windows-x86_64-*.zip` |
            | macOS (Intel) | `lan-file-browser-macos-x86_64-*.tar.gz` |
            | macOS (Apple Silicon M1/M2/M3/M4) | `lan-file-browser-macos-aarch64-*.tar.gz` |
            | Linux (x86_64) | `lan-file-browser-linux-x86_64-*.tar.gz` |

            > macOS Intel 版通过 Rosetta 2 交叉编译生成，也可直接使用 Apple Silicon 版（Rosetta 2 会自动兼容）。

            解压后直接运行，无需安装 Python。/ Extract and run directly, no Python required.
